server:
  port: 8080
  servlet:
    context-path: /api

spring:
  # APPLICATION CONFIG
  application:
    name: Zola
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # DATASOURCE CONFIG
  datasource:
    url: jdbc:postgresql://localhost:5432/Zola
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  # JPA/HIBERNATE CONFIG
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true











open:
  api:
    title: "Zola API"
    version: "v1.0.0"
    description: "API for Zola Application."
    server:
      url: "http://localhost:8080/api"
      description: "Local Server."
    group:
      package-to-scan: "com.zolacontroller"

    host: https://api.brevo.com
    api-key: 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
    endpoint: /v3/smtp/email
    sender:
      email: vuthevy12092004@gmail.com
      name: Vu The Vy


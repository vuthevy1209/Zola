server:
  port: 8080
  servlet:
    context-path: /api

client:
  url: ${CLIENT_URL:http://localhost:3000}

spring:
  # APPLICATION CONFIG
  application:
    name: Zola
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # JACKSON CONFIG
  jackson:
    serialization:
      write-dates-as-timestamps: false

  # DATASOURCE CONFIG
  datasource:
    url: jdbc:postgresql://localhost:5432/Zola
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  # JPA/HIBERNATE CONFIG
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # MAIL CONFIG (Brevo - From reference project)
